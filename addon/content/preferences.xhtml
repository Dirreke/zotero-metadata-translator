<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:link rel="stylesheet" href="preferences.css" />
</linkset>

<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window })"
>
  <html:div class="metadata-translator-pref">
    <html:header class="metadata-translator-header">
      <html:h2 data-l10n-id="pref-title"></html:h2>
      <html:p data-l10n-id="pref-settings-intro"></html:p>
    </html:header>

    <html:section class="metadata-translator-card">
      <html:div class="metadata-translator-card-head">
        <html:h3 data-l10n-id="pref-auto-title"></html:h3>
      </html:div>

      <html:div class="metadata-translator-options">
        <checkbox
          id="zotero-prefpane-__addonRef__-auto-process"
          data-l10n-id="pref-auto-process"
        />

        <checkbox
          id="zotero-prefpane-__addonRef__-auto-create-english-item"
          data-l10n-id="pref-auto-create-english-item"
        />
      </html:div>

      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-auto-process-desc"
      ></html:p>
      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-auto-create-english-item-desc"
      ></html:p>

      <html:div class="metadata-translator-placement">
        <html:h4 data-l10n-id="pref-english-placement-title"></html:h4>

        <html:div class="metadata-translator-placement-row">
          <html:label class="metadata-translator-radio-row">
            <html:input
              id="zotero-prefpane-__addonRef__-english-placement-same"
              type="radio"
              name="metadata-translator-english-placement"
            />
            <html:span data-l10n-id="pref-english-placement-same"></html:span>
          </html:label>
        </html:div>

        <html:div
          class="metadata-translator-placement-row metadata-translator-placement-custom-row"
        >
          <html:label class="metadata-translator-radio-row">
            <html:input
              id="zotero-prefpane-__addonRef__-english-placement-custom"
              type="radio"
              name="metadata-translator-english-placement"
            />
            <html:span data-l10n-id="pref-english-placement-custom"></html:span>
          </html:label>

          <html:div
            id="zotero-prefpane-__addonRef__-english-placement-custom-controls"
            class="metadata-translator-custom-controls"
          >
            <html:select
              id="zotero-prefpane-__addonRef__-english-collection-select"
              class="metadata-translator-collection-select"
            ></html:select>

            <html:button
              id="zotero-prefpane-__addonRef__-english-collection-refresh"
              class="metadata-translator-refresh-button"
              type="button"
              data-l10n-id="pref-english-collection-refresh"
            >
            </html:button>

            <html:p
              id="zotero-prefpane-__addonRef__-english-collection-status"
              class="metadata-translator-status"
            >
            </html:p>
          </html:div>
        </html:div>

        <html:p
          class="metadata-translator-note"
          data-l10n-id="pref-english-placement-note"
        ></html:p>
      </html:div>
    </html:section>

    <html:section class="metadata-translator-card">
      <html:div class="metadata-translator-card-head">
        <html:h3 data-l10n-id="pref-title-field-title"></html:h3>
        <html:span
          class="metadata-translator-badge"
          data-l10n-id="pref-title-field-badge"
        ></html:span>
      </html:div>

      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-title-field-desc"
      ></html:p>

      <html:div class="metadata-translator-options">
        <checkbox
          id="zotero-prefpane-__addonRef__-title-file"
          data-l10n-id="pref-source-file-title"
        />
      </html:div>

      <html:p
        class="metadata-translator-note"
        data-l10n-id="pref-title-note"
      ></html:p>
    </html:section>

    <html:section class="metadata-translator-card">
      <html:div class="metadata-translator-card-head">
        <html:h3 data-l10n-id="pref-author-field-title"></html:h3>
        <html:span
          class="metadata-translator-badge"
          data-l10n-id="pref-author-field-badge"
        ></html:span>
      </html:div>

      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-author-field-desc"
      ></html:p>

      <html:div class="metadata-translator-options">
        <checkbox
          id="zotero-prefpane-__addonRef__-author-file"
          data-l10n-id="pref-source-file-author"
        />

        <checkbox
          id="zotero-prefpane-__addonRef__-author-pinyin"
          data-l10n-id="pref-source-pinyin-author"
        />
      </html:div>

      <html:p
        class="metadata-translator-note"
        data-l10n-id="pref-author-note"
      ></html:p>
    </html:section>

    <html:section class="metadata-translator-card">
      <html:div class="metadata-translator-card-head">
        <html:h3 data-l10n-id="pref-container-field-title"></html:h3>
        <html:span
          class="metadata-translator-badge"
          data-l10n-id="pref-container-field-badge"
        ></html:span>
      </html:div>

      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-container-field-desc"
      ></html:p>

      <html:div class="metadata-translator-options">
        <checkbox
          id="zotero-prefpane-__addonRef__-container-map"
          data-l10n-id="pref-source-map-container"
        />
      </html:div>

      <html:p
        class="metadata-translator-note"
        data-l10n-id="pref-container-note"
      ></html:p>

      <html:div class="metadata-translator-map-editor">
        <html:div class="metadata-translator-map-editor-head">
          <html:label
            class="metadata-translator-map-label"
            for="zotero-prefpane-__addonRef__-container-map-json"
            data-l10n-id="pref-container-map-json-label"
          ></html:label>

          <html:div class="metadata-translator-map-actions">
            <html:button
              id="zotero-prefpane-__addonRef__-container-map-save"
              type="button"
              data-l10n-id="pref-container-map-save"
            ></html:button>

            <html:button
              id="zotero-prefpane-__addonRef__-container-map-example"
              type="button"
              data-l10n-id="pref-container-map-example"
            ></html:button>

            <html:button
              id="zotero-prefpane-__addonRef__-container-map-clear"
              type="button"
              data-l10n-id="pref-container-map-clear"
            ></html:button>
          </html:div>
        </html:div>

        <html:textarea
          id="zotero-prefpane-__addonRef__-container-map-json"
          class="metadata-translator-map-textarea"
          spellcheck="false"
        ></html:textarea>

        <html:p
          id="zotero-prefpane-__addonRef__-container-map-status"
          class="metadata-translator-status"
        ></html:p>

        <html:p
          class="metadata-translator-note"
          data-l10n-id="pref-container-map-json-note"
        ></html:p>
      </html:div>
    </html:section>

    <html:section class="metadata-translator-card metadata-translator-about">
      <html:div class="metadata-translator-card-head">
        <html:h3 data-l10n-id="pref-about-title"></html:h3>
      </html:div>

      <html:p
        class="metadata-translator-desc"
        data-l10n-id="pref-about-desc"
      ></html:p>

      <html:p
        class="metadata-translator-version"
        data-l10n-id="pref-help"
        data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
      ></html:p>
    </html:section>
  </html:div>
</groupbox>
